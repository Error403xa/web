version: '3.8'

services:
  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: android-remote-backend
    ports:
      - "5000:80"
      - "5555:5555"  # 设备连接端口
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DeviceServer__Port=5555
    networks:
      - android-remote-network
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: android-remote-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - android-remote-network
    restart: unless-stopped

networks:
  android-remote-network:
    driver: bridge

